name: Appium Server Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publishing or tagging)'
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Setup Node and install deps (LTS)
        uses: ./.github/actions/setup-build
        with:
          node-version: lts/*
          install-command: bun install --frozen-lockfile
          run-build: 'true'

      - name: Setup npmrc for GitHub Packages
        run: |
          echo "@testspectra:registry=https://npm.pkg.github.com" > ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" >> ~/.npmrc

      - name: Run Lerna publish
        env:
          # for lerna createRelease
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "Running lerna publish in dry-run mode"
            printf "n\n" | bunx lerna version --exact --no-git-tag-version --no-push
          else
            echo "Running lerna publish for real"
            bun run release -- --yes
          fi

