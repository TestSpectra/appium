name: Setup Node, Install, Build

description: |
  Common setup for Appium CI jobs: checkout, setup Node, install deps, optional build, optional V8 cache clear.

inputs:
  node-version:
    description: Node.js version to setup
    required: true
  install-command:
    description: npm install command
    required: false
    default: npm ci --foreground-scripts
  run-build:
    description: Whether to run npm run build
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1
      with:
        bun-version: latest
    - name: SocketDev Security Check
      uses: SocketDev/action@v1
      with:
        mode: firewall-free
    - name: Install dependencies
      shell: bash
      run: |
        install_cmd="${{ inputs.install-command }}"
        # If the command is the default npm one, or contains npm, switch to bun
        if [[ "$install_cmd" == "npm ci"* ]] || [[ "$install_cmd" == "npm install"* ]]; then
          install_cmd="bun install --frozen-lockfile"
        fi
        $install_cmd
    - name: Build packages
      if: ${{ inputs.run-build == 'true' }}
      shell: bash
      run: bun run build
